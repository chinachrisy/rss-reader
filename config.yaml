# RSS 订阅 - HN Popular Blogs 2025
feeds:
  # === 知名技术网站，先关注这三个，分类到markt里面关注市场营销信息 ===
  - name: "36氪"
    url: "https://36kr.com/feed"
    category: "market"
  - name: "人人都是产品经理"
    url: "https://plink.anyfeeder.com/woshipm/popular"
    category: "market"
  # - name: "虎嗅网"
  #   url: "https://www.huxiu.com/rss/0.xml"
  #   category: "market"

# LLM 配置
llm:
  provider: "openai" # claude / openai / ollama

  # OpenAI 配置（当 provider 为 openai 时使用）
  openai_api_key: "sk-b677b1d83e6b4befb9ceb"
  openai_api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  openai_model: "qwen-max"

  # 摘要 prompt (Smart Brevity 风格)
  summary_prompt: |
    请用中文为以下文章生成结构化摘要，包括将标题翻译成中文：

    原标题：{title}
    内容：{content}

    请严格按以下格式输出（不要添加其他内容）：

    🏷️ [中文标题翻译]

    📌 [一句话核心观点，不超过30字]

    💡 为什么值得关注:
    [1-2句话说明]

    📋 关键要点:
    • [要点1]
    • [要点2]
    • [要点3]

    ⭐ 推荐: [值得精读 / 建议浏览 / 可跳过]

# 推送配置
notify:
  # 飞书
  feishu:
    enabled: true
    webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/b4d3fa67-9e65-46b0-8dde-d4ce29f669cd"

# 运行配置
schedule:
  interval_minutes: 15 # 每15分钟检查一次
  max_articles_per_run: 10 # 每次最多处理10篇
  max_age_hours: 24 # 只处理最近24小时内的文章
